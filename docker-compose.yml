# Hermes Anywhere — cloud-agnostic Docker Compose for the Nous Research Hermes Agent.
#
# - gateway: messaging + cron + curator (`hermes gateway run`)
# - dashboard: web UI on port 9119
#
# Both services share the hermes-data/ bind mount. Pin a specific image tag —
# never use :latest. Browse tags: https://hub.docker.com/r/nousresearch/hermes-agent/tags

name: hermes

services:
  gateway:
    image: nousresearch/hermes-agent:${HERMES_VERSION:-v2026.4.30}
    container_name: hermes-gateway
    restart: unless-stopped
    volumes:
      - ./hermes-data:/opt/data
    env_file:
      - .env
    command: ["gateway", "run"]

  dashboard:
    image: nousresearch/hermes-agent:${HERMES_VERSION:-v2026.4.30}
    container_name: hermes-dashboard
    restart: unless-stopped
    volumes:
      - ./hermes-data:/opt/data
    env_file:
      - .env
    ports:
      # Bind to all interfaces on cloud VMs; the cloud firewall + auth gates access.
      # For local-only setups, change to "127.0.0.1:9119:9119".
      - "${DASHBOARD_BIND:-0.0.0.0}:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
